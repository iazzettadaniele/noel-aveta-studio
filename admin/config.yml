backend:
  name: git-gateway
  branch: main # Ramo principale della repository
  commit_messages:
    create: "Crea {{collection}} '{{slug}}'"
    update: "Aggiorna {{collection}} '{{slug}}'"
    delete: "Elimina {{collection}} '{{slug}}'"
    uploadMedia: "Carica '{{path}}'"
    deleteMedia: "Elimina '{{path}}'"

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "it"

collections:
  - name: "content"
    label: "Contenuti del Sito"
    files:
      - label: "Homepage & Contenuti"
        name: "homepage"
        file: "data/content.json"
        fields:
          - label: "Impostazioni SEO"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Seo Title", name: "title", widget: "string", default: "Noel Aveta Studio | Fotografia di ritratto & matrimoni"}
              - {label: "Seo Description", name: "description", widget: "text", default: "Noel Aveta Studio specializzato in ritratti e matrimoni, con sede a Roma."}
          
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Sottotitolo Hero", name: "subtitle", widget: "string", default: "Fotografia di ritratto & matrimoni · Roma"}
          
          - label: "Chi Sono"
            name: "about"
            widget: "object"
            fields:
              - {label: "Titolo", name: "title", widget: "string", default: "La prospettiva del ritratto"}
              - {label: "Testo", name: "text", widget: "text", default: "Noel Aveta è uno studio fotografico di base a Roma, focalizzato sulla cattura di momenti autentici. Utilizziamo la luce naturale e un approccio minimalista per creare immagini senza tempo.\n\nOgni scatto è pensato per rivelare l'anima dei soggetti, in un'estetica che richiama l'alta moda e l'essenzialità editoriale."}
              - {label: "Foto Profilo", name: "image", widget: "image", required: false}

          - label: "Servizi"
            name: "services"
            widget: "list"
            fields:
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "Prezzo", name: "price", widget: "string"}
              - {label: "Descrizione", name: "description", widget: "text"}

          - label: "Galleria"
            name: "gallery"
            widget: "list"
            fields:
              - {label: "Titolo Immagine", name: "title", widget: "string"}
              - {label: "Immagine", name: "image", widget: "image"}

          - label: "Contatti"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Email", name: "email", widget: "string", default: "info@noelavetastudio.it"}
              - {label: "Telefono", name: "phone", widget: "string", default: "+39 333 1234567"}
              - {label: "Instagram", name: "instagram", widget: "string", default: "@noelaveta"}
